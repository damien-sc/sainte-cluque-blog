baseURL = "https://sainte-cluque.com/"
languageCode = "fr-FR"
title = "Saintecluque's Blog"
theme = "sainte-cluque"

paginate = 12
summaryLength = 30

[params]
  description = "A collection of memories, growing up moments, and family adventures."
  author = "The Sainte-Cluque Family"
  established = "2009"

[menu]
  [[menu.main]]
    name = "Accueil"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Articles"
    url = "/posts/"
    weight = 5
  [[menu.main]]
    name = "Catégories"
    url = "/categories/"
    weight = 10
  [[menu.main]]
    name = "Archives"
    url = "/archives/"
    weight = 15

[taxonomies]
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
